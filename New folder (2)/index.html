<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Her Money & AI | Kirti Thakran</title>
<meta name="description" content="Helping Canadian moms make smarter money decisions. Budgeting, TFSA, RRSP, maternity leave & financial independence.">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --sage:#A8C3A0;--sage-d:#7FA876;--sage-l:#D8EDD4;
  --teal:#6BA3A0;--teal-d:#4E7E7B;
  --rose:#E8A0A0;--rose-d:#D98080;
  --cream:#F7F3EF;--cream-d:#EDE7DF;
  --charcoal:#333333;--mid:#666666;--light:#999999;--white:#FFFFFF;
  --r:14px;--pill:999px;
  --sh:0 2px 16px rgba(0,0,0,.07);
  --sh-md:0 6px 28px rgba(0,0,0,.11);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--charcoal);font-size:15px;line-height:1.65;overflow-x:hidden}
h1,h2,h3{font-family:'Playfair Display',serif;line-height:1.2}
a{color:inherit;text-decoration:none}
img{display:block}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(247,243,239,.94);backdrop-filter:blur(14px);border-bottom:1px solid rgba(168,195,160,.2);padding:13px 20px;display:flex;align-items:center;justify-content:space-between}
.nav-brand{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--charcoal)}
.nav-brand span{color:var(--sage-d)}
.nav-pill{background:var(--rose);color:#fff;border:none;border-radius:var(--pill);padding:9px 18px;font-family:'Inter',sans-serif;font-size:.8rem;font-weight:700;cursor:pointer;text-decoration:none;transition:.2s;display:inline-block}
.nav-pill:hover{background:var(--rose-d);transform:translateY(-1px)}

/* LOADING STATE */
.loading-msg{text-align:center;padding:120px 20px 40px;color:var(--mid);font-size:.95rem}
.spinner{width:36px;height:36px;border:3px solid var(--sage-l);border-top-color:var(--sage-d);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* PAGE WRAPPER */
.page{max-width:520px;margin:0 auto;padding:0 16px}

/* HERO */
.hero{padding:100px 0 56px;display:flex;flex-direction:column;align-items:center;text-align:center;position:relative}
.hero::before{content:'';position:absolute;top:-80px;right:-100px;width:380px;height:380px;border-radius:50%;background:radial-gradient(circle,rgba(168,195,160,.18) 0%,transparent 70%);pointer-events:none}

/* Profile */
.profile-ring{position:relative;width:112px;height:112px;border-radius:50%;padding:3px;background:linear-gradient(135deg,var(--sage),var(--teal),var(--rose));margin-bottom:14px}
.profile-ring img{width:100%;height:100%;border-radius:50%;object-fit:cover;object-position:center top;border:3px solid #fff}
.profile-emoji{position:absolute;bottom:2px;right:2px;background:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:13px;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.hero-name{font-size:1.65rem;margin-bottom:3px}
.hero-handle{font-size:.78rem;color:var(--sage-d);font-weight:700;letter-spacing:.05em;margin-bottom:12px}
.hero-tag{font-size:.93rem;color:var(--mid);max-width:340px;margin:0 auto 5px}
.hero-sub{font-size:.73rem;color:var(--light);margin-bottom:24px}

/* Stats */
.stats{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-bottom:26px}
.stat-pill{background:#fff;border:1px solid var(--cream-d);border-radius:var(--pill);padding:5px 14px;font-size:.72rem;font-weight:600;box-shadow:var(--sh)}

/* Link buttons */
.links{width:100%;display:flex;flex-direction:column;gap:10px}
.lbtn{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-radius:var(--r);font-weight:500;font-size:.88rem;transition:transform .18s,box-shadow .18s;cursor:pointer;border:none;width:100%;text-align:left;box-shadow:var(--sh);text-decoration:none}
.lbtn:hover{transform:translateY(-2px);box-shadow:var(--sh-md)}
.lbtn .ll{display:flex;align-items:center;gap:11px}
.lbtn .ico{font-size:1.15rem;width:32px;text-align:center;flex-shrink:0}
.lbtn .lbl{font-size:.88rem;font-weight:600;color:inherit}
.lbtn .sub{font-size:.71rem;font-weight:400;margin-top:1px;opacity:.7}
.lbtn .arr{font-size:.9rem;opacity:.5;flex-shrink:0}
.lbtn.sage{background:var(--sage);color:#fff}
.lbtn.sage:hover{background:var(--sage-d)}
.lbtn.rose{background:var(--rose);color:#fff}
.lbtn.rose:hover{background:var(--rose-d)}
.lbtn.teal{background:var(--teal);color:#fff}
.lbtn.teal:hover{background:var(--teal-d)}
.lbtn.dark{background:var(--charcoal);color:#fff}
.lbtn.dark:hover{background:#111}
.lbtn.white{background:#fff;color:var(--charcoal)}

/* Section divider label */
.sec-divider{display:flex;align-items:center;gap:10px;margin:26px 0 10px;width:100%}
.sec-divider span{font-size:.67rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--mid);white-space:nowrap}
.sec-divider::before,.sec-divider::after{content:'';flex:1;height:1px;background:var(--cream-d)}

/* SEEN ON */
.seen-on{background:var(--sage-l);padding:26px 20px;text-align:center}
.seen-on p{font-size:.67rem;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--sage-d);margin-bottom:13px}
.platforms{display:flex;gap:9px;justify-content:center;flex-wrap:wrap}
.plat{display:flex;align-items:center;gap:6px;background:#fff;border-radius:var(--pill);padding:8px 16px;font-size:.8rem;font-weight:600;box-shadow:var(--sh);text-decoration:none;color:var(--charcoal);transition:.18s}
.plat:hover{transform:translateY(-1px);box-shadow:var(--sh-md)}

/* SECTIONS */
.section{padding:68px 20px}
.section.alt{background:#fff}
.sec-wrap{max-width:880px;margin:0 auto}
.sec-head{margin-bottom:34px}
.sec-tag{font-size:.67rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--sage-d);margin-bottom:9px}
.sec-head h2{font-size:1.75rem;margin-bottom:9px}
.sec-head p{color:var(--mid);max-width:480px;font-size:.88rem}

/* ABOUT GRID */
.about-grid{display:grid;grid-template-columns:1fr 1.25fr;gap:48px;align-items:center}
.about-img-wrap{position:relative}
.about-img{width:100%;height:390px;object-fit:cover;object-position:center top;border-radius:var(--r);box-shadow:var(--sh-md)}
.about-float{position:absolute;bottom:-16px;right:-16px;background:var(--sage);color:#fff;border-radius:var(--r);padding:14px 18px;font-size:.78rem;font-weight:500;box-shadow:var(--sh-md);max-width:165px;line-height:1.4}
.about-float strong{display:block;font-size:.98rem;margin-bottom:2px}
.about-text p{color:var(--mid);margin-bottom:13px;font-size:.88rem}
.about-text h2{font-size:1.7rem;margin-bottom:14px}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:18px}
.chip{background:var(--cream);border:1px solid var(--cream-d);border-radius:var(--pill);padding:5px 13px;font-size:.74rem;font-weight:500}

/* RESOURCES GRID */
.res-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
.res-card{background:#fff;border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);transition:transform .2s,box-shadow .2s;cursor:pointer}
.res-card:hover{transform:translateY(-4px);box-shadow:var(--sh-md)}
.res-top{padding:22px 20px 12px;background:linear-gradient(135deg,var(--sage-l),var(--cream));display:flex;align-items:center;justify-content:space-between}
.res-ico{font-size:2rem}
.badge{font-size:.63rem;font-weight:700;letter-spacing:.08em;border-radius:var(--pill);padding:3px 10px;text-transform:uppercase;color:#fff}
.badge.free{background:var(--sage-d)}
.badge.soon{background:var(--teal)}
.res-body{padding:14px 20px 20px}
.res-title{font-family:'Playfair Display',serif;font-size:.96rem;margin-bottom:5px}
.res-desc{font-size:.77rem;color:var(--mid);margin-bottom:14px;line-height:1.55}
.res-btn{width:100%;padding:10px;border-radius:8px;border:none;background:var(--charcoal);color:#fff;font-family:'Inter',sans-serif;font-size:.79rem;font-weight:700;cursor:pointer;transition:.2s}
.res-btn:hover{background:var(--sage-d)}
.res-card.coming{background:linear-gradient(135deg,var(--sage-l),var(--cream));border:2px dashed var(--sage)}
.res-card.coming .res-top{background:transparent}
.res-card.coming .res-btn{background:var(--sage-d)}

/* TESTIMONIALS */
.testi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.testi{background:var(--cream);border-radius:var(--r);padding:20px}
.stars{color:#F4C84A;font-size:.9rem;margin-bottom:9px}
.testi-text{font-size:.84rem;color:var(--charcoal);font-style:italic;margin-bottom:13px;line-height:1.6}
.testi-author{display:flex;align-items:center;gap:9px}
.avatar{width:33px;height:33px;border-radius:50%;background:var(--sage);display:flex;align-items:center;justify-content:center;font-size:.78rem;color:#fff;font-weight:700;flex-shrink:0}
.author-name{font-size:.79rem;font-weight:700}
.author-loc{font-size:.71rem;color:var(--light)}

/* TOOLS */
.cat-title{font-size:.8rem;font-weight:700;color:var(--charcoal);margin:26px 0 13px;padding-bottom:8px;border-bottom:2px solid var(--cream-d);letter-spacing:.02em}
.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:13px}
.tool{background:#fff;border-radius:var(--r);padding:18px;display:flex;flex-direction:column;gap:8px;box-shadow:var(--sh);transition:transform .18s}
.tool:hover{transform:translateY(-2px)}
.tool-ico{font-size:1.6rem}
.tool-name{font-family:'Playfair Display',serif;font-size:.93rem}
.tool-desc{font-size:.77rem;color:var(--mid);line-height:1.5;flex:1}
.tool-btn{display:inline-block;padding:8px 15px;border-radius:var(--pill);background:var(--cream);color:var(--charcoal);font-size:.74rem;font-weight:700;border:1.5px solid var(--cream-d);transition:.2s;text-align:center;text-decoration:none}
.tool-btn:hover{background:var(--sage-l);border-color:var(--sage)}
.tool-btn.ref{background:var(--sage);color:#fff;border-color:var(--sage)}
.tool-btn.ref:hover{background:var(--sage-d)}
.disc{margin-top:32px;background:#fff;border-radius:var(--r);padding:15px 18px;font-size:.77rem;color:var(--mid);line-height:1.6;border:1px solid var(--cream-d)}
.disc strong{color:var(--charcoal)}

/* SUBSCRIBE */
#subscribe{background:linear-gradient(135deg,var(--sage) 0%,var(--teal) 100%);padding:68px 20px;text-align:center}
#subscribe .sec-tag{color:rgba(255,255,255,.7)}
#subscribe h2{color:#fff;font-size:1.75rem;margin-bottom:10px}
#subscribe p{color:rgba(255,255,255,.85);max-width:430px;margin:0 auto 28px;font-size:.88rem}
.sub-form{display:flex;gap:9px;max-width:430px;margin:0 auto;flex-wrap:wrap}
.sub-input{flex:1;min-width:170px;padding:12px 16px;border-radius:var(--pill);border:none;font-family:'Inter',sans-serif;font-size:.87rem;background:rgba(255,255,255,.96);color:var(--charcoal);outline:none}
.sub-btn{padding:12px 22px;border-radius:var(--pill);border:none;background:var(--rose);color:#fff;font-family:'Inter',sans-serif;font-size:.87rem;font-weight:700;cursor:pointer;transition:.2s;white-space:nowrap}
.sub-btn:hover{background:var(--rose-d)}
.sub-note{font-size:.71rem;color:rgba(255,255,255,.6);margin-top:9px}

/* FOOTER */
footer{background:var(--charcoal);color:rgba(255,255,255,.5);text-align:center;padding:30px 20px;font-size:.76rem}
footer strong{color:#fff}
footer a{color:var(--sage-l)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.48);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:.24s}
.overlay.on{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:var(--r);padding:30px 26px;max-width:390px;width:100%;position:relative;transform:translateY(14px);transition:.24s;box-shadow:0 24px 64px rgba(0,0,0,.18)}
.overlay.on .modal{transform:none}
.modal-x{position:absolute;top:13px;right:14px;background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--light)}
.m-ico{font-size:2.3rem;margin-bottom:9px}
.m-title{font-size:1.25rem;margin-bottom:5px}
.m-sub{font-size:.81rem;color:var(--mid);margin-bottom:16px}
.m-input{width:100%;padding:11px 13px;border:1.5px solid var(--cream-d);border-radius:8px;font-family:'Inter',sans-serif;font-size:.87rem;color:var(--charcoal);outline:none;transition:.2s;margin-bottom:8px}
.m-input:focus{border-color:var(--sage)}
.m-btn{width:100%;padding:12px;border-radius:8px;border:none;background:var(--rose);color:#fff;font-family:'Inter',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;transition:.2s;margin-bottom:7px}
.m-btn:hover{background:var(--rose-d)}
.m-fine{font-size:.67rem;color:var(--light);text-align:center}
.m-success{display:none;text-align:center;padding:8px 0}
.m-success.on{display:block}
.m-form.off{display:none}

/* FADE IN */
.fi{opacity:0;transform:translateY(14px);transition:opacity .55s ease,transform .55s ease}
.fi.on{opacity:1;transform:none}

/* RESPONSIVE */
@media(max-width:680px){
  .about-grid{grid-template-columns:1fr;gap:26px}
  .about-img{height:250px}
  .about-float{right:8px;bottom:-12px}
  .section{padding:52px 16px}
  .sub-form{flex-direction:column}
  .sub-input,.sub-btn{width:100%}
}
</style>
</head>

/* ─── MODAL ─── */
let _file = null;
function openModal(file, title, sub, ico) {
  _file = file;
  document.getElementById('mIco').textContent = ico || '📥';
  document.getElementById('mTitle').textContent = title;
  document.getElementById('mSub').textContent = sub || 'Enter your email for instant access.';
  document.getElementById('mForm').classList.remove('off');
  document.getElementById('mSuccess').classList.remove('on');
  document.getElementById('mEmail').value = '';
  document.getElementById('mName').value = '';
  document.getElementById('modal').classList.add('on');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('modal').classList.remove('on');
  document.body.style.overflow = '';
}
function overlayClick(e) { if (e.target.id === 'modal') closeModal(); }
function submitModal() {
  const email = document.getElementById('mEmail').value;
  if (!email || !email.includes('@')) { document.getElementById('mEmail').focus(); return; }
  document.getElementById('mForm').classList.add('off');
  document.getElementById('mSuccess').classList.add('on');
  const dl = document.getElementById('mDlLink');
  if (_file && _file !== '#') { dl.href = _file; dl.style.display = 'inline-block'; }
  else { dl.style.display = 'none'; }
}

/* ─── SCROLL FADE IN ─── */
const io = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('on'); });
}, {threshold: 0.08});
function watchFade() {
  document.querySelectorAll('.fi').forEach(el => io.observe(el));
}

/* ─── BUTTON STYLE CLASS ─── */
function styleClass(s) {
  const map = {sage:'sage',rose:'rose',teal:'teal',dark:'dark',white:'white'};
  return map[s] || 'white';
}

/* ─── BUILD HERO LINK BUTTON ─── */
function buildHeroBtn(item) {
  const btn = document.createElement(item.link && !item.gated ? 'a' : 'button');
  btn.className = 'lbtn ' + styleClass(item.style);
  if (!item.gated && item.link) {
    btn.href = item.link;
    if (item.link.startsWith('http')) btn.target = '_blank';
  }
  btn.innerHTML = `
    <div class="ll">
      <span class="ico">${item.emoji}</span>
      <div>
        <div class="lbl">${item.label}</div>
        <div class="sub">${item.sub || ''}</div>
      </div>
    </div>
    <span class="arr">→</span>`;
  if (item.gated) {
    btn.onclick = () => openModal(item.link, item.label, item.sub, item.emoji);
  }
  return btn;
}

/* ─── BUILD RESOURCE CARD ─── */
function buildResCard(item) {
  const isComingSoon = item.badge === 'COMING SOON';
  const div = document.createElement('div');
  div.className = 'res-card fi' + (isComingSoon ? ' coming' : '');
  div.innerHTML = `
    <div class="res-top">
      <span class="res-ico">${item.emoji}</span>
      <span class="badge ${isComingSoon ? 'soon' : 'free'}">${item.badge}</span>
    </div>
    <div class="res-body">
      <div class="res-title">${item.title}</div>
      <div class="res-desc">${item.desc}</div>
      <button class="res-btn">${isComingSoon ? 'Notify Me →' : 'Download Free →'}</button>
    </div>`;
  div.querySelector('.res-btn').onclick = () =>
    openModal(item.file, item.title, item.desc, item.emoji);
  return div;
}

/* ─── BUILD TOOL CARD ─── */
function buildTool(item) {
  const div = document.createElement('div');
  div.className = 'tool fi';
  const btnClass = item.highlight ? 'tool-btn ref' : 'tool-btn';
  div.innerHTML = `
    <div class="tool-ico">${item.emoji}</div>
    <div class="tool-name">${item.name}</div>
    <div class="tool-desc">${item.desc}</div>
    <a href="${item.link}" target="_blank" rel="noopener" class="${btnClass}">${item.btn}</a>`;
  return div;
}

/* ─── BUILD TESTIMONIAL ─── */
function buildTesti(item) {
  const div = document.createElement('div');
  div.className = 'testi fi';
  const initial = item.name ? item.name[0] : '?';
  div.innerHTML = `
    <div class="stars">★★★★★</div>
    <p class="testi-text">"${item.quote}"</p>
    <div class="testi-author">
      <div class="avatar">${initial}</div>
      <div><div class="author-name">${item.name}</div><div class="author-loc">${item.loc}</div></div>
    </div>`;
  return div;
}

/* ─── MAIN BUILD FUNCTION ─── */

  const heroLinks = data.heroLinks.filter(x => x.show !== false);

  let addedDownloadLabel = false;
  let addedToolLabel = false;
  heroLinks.forEach(item => {
    if (item.gated && !addedDownloadLabel) {
      addedDownloadLabel = true;
      heroHTML += `<div class="sec-divider"><span>✨ Free Downloads — enter email to unlock</span></div>`;
    }
    if ((item.label.includes('All My Affiliate') || item.label.includes('Wealthsimple')) && !addedToolLabel && !item.gated) {
      addedToolLabel = true;
      heroHTML += `<div class="sec-divider"><span>🛠️ Affiliate & Referral Links</span></div>`;

  let toolDividerAdded = false;

      dlDividerAdded = true;
      const div = document.createElement('div');
      div.className = 'sec-divider';
      div.innerHTML = `<span>✨ Free Downloads — enter email to unlock</span>`;
      linksContainer.appendChild(div);
    }
    if (!item.gated && !item.link?.startsWith('http') && item.link !== '#about' && !toolDividerAdded &&
        (item.label.includes('Wealthsimple') || item.label.includes('Temu') || item.label.includes('All My'))) {
      toolDividerAdded = true;
      const div = document.createElement('div');
      div.className = 'sec-divider';
      div.innerHTML = `<span>🛠️ Affiliate & Referral Links</span>`;
      linksContainer.appendChild(div);
    }
    linksContainer.appendChild(buildHeroBtn(item));
  });

  app.innerHTML = `
  <!-- HERO -->
  <div class="page">
    <section class="hero">
      <div class="profile-ring">
        <img src="${KIRTI_IMG}" alt="Kirti Thakran">
        <div class="profile-emoji">💚</div>
      </div>
      <h1 class="hero-name">Kirti Thakran</h1>
      <p class="hero-handle">@hermoneyandai</p>
      <p class="hero-tag">Helping Canadian moms make smarter money decisions 💸</p>
      <p class="hero-sub">Cambridge, ON &nbsp;·&nbsp; Finance Pro &nbsp;·&nbsp; New Mama &nbsp;·&nbsp; On Maternity Leave 🍁</p>
      <div class="stats">
        <div class="stat-pill">💰 Finance Pro</div>
        <div class="stat-pill">🍼 New Mom</div>
        <div class="stat-pill">🍁 Canadian</div>
        <div class="stat-pill">🤖 AI + Money</div>
      </div>
      <div id="hero-links"></div>
    </section>
  </div>

  <!-- SEEN ON -->
  <div class="seen-on">
    <p>Find me on</p>
    <div class="platforms">
      <a href="https://youtube.com/@hermoneyand_AI" target="_blank" class="plat">▶️ YouTube</a>
      <a href="https://instagram.com/Hermoneyandai" target="_blank" class="plat">📸 Instagram</a>
      <div class="plat">💼 LinkedIn</div>
      <div class="plat">🎵 TikTok</div>
    </div>
  </div>

  <!-- ABOUT -->
  <section id="about" class="section alt">
    <div class="sec-wrap">
      <div class="about-grid">
        <div class="about-img-wrap fi">
          <img src="${LIFESTYLE_IMG}" alt="Kirti Thakran" class="about-img">
          <div class="about-float"><strong>Finance Pro 💚</strong>Canada since 2022 · Navigating mat leave & baby finance</div>
        </div>
        <div class="about-text fi">
          <p class="sec-tag">About Kirti</p>
          <h2>From Finance Professional to Canadian Mom Money Guide</h2>
          <p>Hi! I'm Kirti — a finance professional, new mama to a beautiful 3-month-old daughter, and founder of <strong>Her Money & AI</strong>. I moved to Canada from India in 2022, and quickly found my footing in the finance world.</p>
          <p>When I went on maternity leave, I realized something: there's almost <em>no</em> practical money information out there for new Canadian moms. What happens to your income? How do you keep investing? What's worth buying for baby?</p>
          <p>I'm living all of this right now — reduced income, baby expenses, TFSA contributions, and building financial independence while raising a family. And I'm sharing it all, honestly.</p>
          <p>Whether you're navigating maternity leave, wondering where to invest, or trying to make your budget work with a new baby — <strong>you're in the right place.</strong></p>
          <div class="chips">
            <span class="chip">💰 Budgeting</span>
            <span class="chip">🍁 TFSA / RRSP</span>
            <span class="chip">🤱 Maternity Leave</span>
            <span class="chip">📈 Investing</span>
            <span class="chip">🧸 Baby Finance</span>
            <span class="chip">🔥 FIRE Planning</span>
            <span class="chip">🤖 AI Money Tools</span>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- RESOURCES -->
  <section id="resources" class="section">
    <div class="sec-wrap">
      <div class="sec-head fi">
        <p class="sec-tag">Free Resources</p>
        <h2>Tools Built for Canadian Moms</h2>
        <p>Every tracker is built for the Canadian system — no generic advice, no fluff.</p>
      </div>
      <div class="res-grid" id="res-grid"></div>
    </div>
  </section>

  <!-- TESTIMONIALS -->
  <section id="testimonials" class="section alt">
    <div class="sec-wrap">
      <div class="sec-head fi">
        <p class="sec-tag">Community Love</p>
        <h2>What Moms Are Saying</h2>
        <p>Real feedback from the Her Money & AI community.</p>
      </div>
      <div class="testi-grid" id="testi-grid"></div>
    </div>
  </section>

  <!-- TOOLS -->
  <section id="tools" class="section">
    <div class="sec-wrap">
      <div class="sec-head fi">
        <p class="sec-tag">Affiliate Links</p>
        <h2>What I Actually Use & Recommend</h2>
        <p>Honest picks only. Some links are referral/affiliate links — same price for you, small bonus for me. 💚</p>
      </div>
      <div id="tools-content"></div>

    </div>
  </section>

  <!-- SUBSCRIBE -->
  <section id="subscribe">
    <div style="text-align:center;max-width:880px;margin:0 auto">
      <p class="sec-tag fi">Join the Community</p>
      <h2 class="fi" style="color:#fff;font-size:1.75rem;margin-bottom:10px">Get Weekly Money Tips for Canadian Moms</h2>
      <p class="fi" style="color:rgba(255,255,255,.85);max-width:430px;margin:0 auto 28px;font-size:.88rem">No spam. No overwhelm. Just practical financial tips — every week.</p>
      <form class="sub-form fi" onsubmit="handleSub(event)">
        <input type="email" class="sub-input" placeholder="your@email.com" required id="sub-email">
        <button type="submit" class="sub-btn">Yes, send me tips! 💚</button>
      </form>
      <p class="sub-note">Join other Canadian moms building financial confidence. Unsubscribe anytime.</p>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <p><strong>Her Money & AI</strong> · Kirti Thakran · Cambridge, Ontario 🍁</p>
    <p style="margin-top:6px"><a href="#">Privacy Policy</a> &nbsp;·&nbsp; <a href="#">Disclaimer</a></p>
    <p style="margin-top:6px;font-size:.7rem">Content is for educational purposes only and does not constitute financial advice.</p>
  </footer>`;

  /* Inject hero links */
  document.getElementById('hero-links').appendChild(linksContainer);

  /* Resources */
  const resGrid = document.getElementById('res-grid');
  data.resources.filter(x => x.show !== false).forEach(item => resGrid.appendChild(buildResCard(item)));

  /* Testimonials */
  const testiGrid = document.getElementById('testi-grid');
  data.testimonials.filter(x => x.show !== false).forEach(item => testiGrid.appendChild(buildTesti(item)));

  /* Tools — group by category */
  const toolsContent = document.getElementById('tools-content');
  const visibleTools = data.tools.filter(x => x.show !== false);
  const cats = [...new Set(visibleTools.map(t => t.category))];
  cats.forEach(cat => {
    const title = document.createElement('p');
    title.className = 'cat-title fi';
    title.textContent = cat;
    toolsContent.appendChild(title);
    const grid = document.createElement('div');
    grid.className = 'tools-grid';
    visibleTools.filter(t => t.category === cat).forEach(t => grid.appendChild(buildTool(t)));
    toolsContent.appendChild(grid);
  });

  watchFade();
}

function handleSub(e) {
  e.preventDefault();
  e.target.innerHTML = '<p style="color:#fff;font-weight:700;font-size:1rem">🎉 You\'re on the list! Check your inbox.</p>';
}

/* ─── LOAD JSON ─── */
fetch('links.json')
  .then(r => { if (!r.ok) throw new Error('no json'); return r.json(); })
  .then(data => buildPage(data))
  .catch(() => {
    // Fallback: page still works with embedded defaults
    fetch('links.json?' + Date.now())
      .then(r => r.json())
      .then(data => buildPage(data))
      .catch(() => {
        document.getElementById('app').innerHTML =
          '<div class="loading-msg" style="padding-top:140px"><p>⚠️ Could not load links.json — make sure it is in the same folder as index.html.</p></div>';
      });
  });
</script>
</body>
</html>
